<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday ❤️</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="hearts"></div>

<div class="container">

    <h1>🎂 Happy Birthday ❤️</h1>

    <h2>To My Dearest Husband</h2>

    <button id="openBtn">
        💌 Open My Letter
    </button>


    <div id="letter" class="hidden">

        <h2>My Love ❤️</h2>

        <p id="message"></p>

        <img src="photo.jpg" alt="Our Photo">


        <button id="surpriseBtn" class="hidden">
            ❤️ One More Surprise
        </button>


        <p id="surprise" class="hidden">

            I can't wait to create more beautiful memories with you.

            <br><br>

            You are my forever person ❤️

            <br><br>

            Forever Yours,
            <br>
            Arshika ❤️

        </p>


    </div>


</div>


<script src="script.js"></script>

</body>

</html>
